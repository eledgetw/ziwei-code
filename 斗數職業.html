    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00e5ff;
            --neon-cyan-glow: rgba(0, 229, 255, 0.5);
            --neon-amber: #ffab00;
            --neon-rose: #ff2a6d;
            --dark-bg: #0b0f19;
            --panel-bg: rgba(13, 20, 36, 0.8);
        }

        body {
            /* 這裡已改為無襯線字體家族 */
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--dark-bg);
            /* 科技感網格背景 */
            background-image: 
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 229, 255, 0.05);
        }

        /* 按鈕科技感樣式 */
        .star-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 229, 255, 0.3);
            background: rgba(0, 40, 60, 0.4);
            color: var(--neon-cyan);
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.3);
            font-weight: 500; /* 按鈕字體加粗一點 */
        }
        
        .star-btn:hover {
            background-color: rgba(0, 229, 255, 0.1);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan-glow), inset 0 0 10px var(--neon-cyan-glow);
        }

        .star-btn.active {
            background: var(--neon-cyan);
            color: var(--dark-bg);
            font-weight: 900;
            text-shadow: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan-glow);
            transform: translateY(-2px);
        }

        /* 內容淡入動畫 */
        .fade-enter {
            opacity: 0;
            transform: translateY(15px) scale(0.98);
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }
        
        /* 滾動條美化 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(11, 15, 25, 0.8);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 229, 255, 0.3);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-cyan);
        }
    </style>
</head>

                container.appendChild(btn);

                <div class="flex items-center justify-between mb-8 pb-4 border-b border-cyan-500/30">
                    <h3 class="text-3xl md:text-4xl font-black text-white tracking-widest drop-shadow-[0_0_8px_rgba(255,255,255,0.8)] flex items-center">
                        <span class="text-cyan-400 mr-2">✦</span> ${starName}星
                    </h3>
                    <div class="text-xs md:text-sm font-bold border ${ziweiStars.includes(starName) ? 'border-cyan-400 text-cyan-400 bg-cyan-900/40' : 'border-amber-400 text-amber-400 bg-amber-900/40'} px-4 py-1.5 rounded-full uppercase tracking-wider shadow-[0_0_10px_rgba(0,0,0,0.5)]">
                        ${ziweiStars.includes(starName) ? '紫微星系' : '天府星系'}
                    </div>
                </div>
                <div class="overflow-x-auto rounded border border-cyan-800/60 shadow-[0_0_20px_rgba(0,0,0,0.8)] bg-[#0b101e]/80">
                    <table class="w-full text-left text-sm md:text-base">
                        <tbody>
            `;

            let inWarningSection = false;

            for (let i = 0; i < rows.length; i++) {
                let key = rows[i].k;
                let val = rows[i].v;

                if (key.includes("落陷") || key.includes("忌煞")) {
                    inWarningSection = true;
                }

                if (key && !val) {
                    let headerStyle = inWarningSection 
                        ? 'bg-rose-600/20 text-rose-400 border-y border-rose-500/50 shadow-[inset_0_0_15px_rgba(255,42,109,0.2)]' 
                        : 'bg-cyan-900/30 text-amber-400 border-y border-cyan-500/30 shadow-[inset_0_0_15px_rgba(0,229,255,0.1)]';
                    
                    let icon = inWarningSection ? '⚠' : '◈';
                    
                    html += `
                    <tr>
                        <td colspan="2" class="py-4 px-5 font-bold text-lg md:text-xl text-center tracking-[0.2em] ${headerStyle}">
                            ${icon} ${key} ${icon}
                        </td>
                    </tr>`;
                } else if (!key && val) {
                    html += `
                    <tr class="border-b border-cyan-900/50">
                        <td colspan="2" class="py-4 px-5 text-gray-300 leading-relaxed align-top font-light">
                            ${val}
                        </td>
                    </tr>`;
                } else {
                    let rowHover = inWarningSection ? 'hover:bg-rose-900/20' : 'hover:bg-cyan-900/20';
                    let keyBg = inWarningSection ? 'bg-rose-950/40 text-rose-300 border-rose-900/50' : 'bg-[#0f172a]/80 text-cyan-300 border-cyan-900/50';
                    let valColor = inWarningSection ? 'text-gray-200' : 'text-gray-100';
                    
                    if(val === "具體推薦職業示例") {
                        valColor = "text-amber-500/80 text-xs tracking-widest font-bold";
                    }

                    html += `
                    <tr class="transition-colors duration-200 ${rowHover} border-b border-cyan-900/50 last:border-0 group">
                        <th class="w-[1%] py-4 px-5 font-bold ${keyBg} align-top whitespace-nowrap border-r group-hover:brightness-125 transition-all tracking-wider leading-relaxed">
                            ${key}
                        </th>
                        <td class="py-4 px-5 ${valColor} leading-relaxed align-top font-light">
                            ${val}
                        </td>
                    </tr>`;
                }
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;
            return html;
        }

        function selectStar(starName, btnElement) {
            document.querySelectorAll('.star-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            const contentDisplay = document.getElementById('content-display');
            contentDisplay.classList.remove('fade-enter-active');
            
            setTimeout(() => {
                contentDisplay.innerHTML = renderTable(starName);
                void contentDisplay.offsetWidth; 
                contentDisplay.classList.add('fade-enter-active');
            }, 100);
        }

        window.onload = () => {
            createButtons(ziweiStars, 'ziwei-group');
            createButtons(tianfuStars, 'tianfu-group');
            
            const firstBtn = document.querySelector('#ziwei-group button');
            if(firstBtn) {
                selectStar('紫微', firstBtn);
            }
        };
    </script>
</body>
</html>
